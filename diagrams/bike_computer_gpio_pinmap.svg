<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 720" width="860" height="720" font-family="monospace, sans-serif">
  <rect width="860" height="720" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Bike Computer — GPIO Pin Map</text>
  <text x="430" y="52" text-anchor="middle" fill="#888" font-size="11">Raspberry Pi Zero 40-pin Header</text>

  <!-- Legend -->
  <rect x="30" y="65" width="12" height="12" fill="#ff6b35" rx="2"/>
  <text x="46" y="75" fill="#ccc" font-size="10">GPS HAT (UART)</text>
  <rect x="165" y="65" width="12" height="12" fill="#38b000" rx="2"/>
  <text x="181" y="75" fill="#ccc" font-size="10">Env HAT (I2C)</text>
  <rect x="300" y="65" width="12" height="12" fill="#3a86ff" rx="2"/>
  <text x="316" y="75" fill="#ccc" font-size="10">TFT Display (SPI)</text>
  <rect x="460" y="65" width="12" height="12" fill="#9b59b6" rx="2"/>
  <text x="476" y="75" fill="#ccc" font-size="10">TFT Touch</text>
  <rect x="570" y="65" width="12" height="12" fill="#e63946" rx="2"/>
  <text x="586" y="75" fill="#ccc" font-size="10">3.3V Power</text>
  <rect x="660" y="65" width="12" height="12" fill="#e9c46a" rx="2"/>
  <text x="676" y="75" fill="#ccc" font-size="10">5V Power</text>
  <rect x="740" y="65" width="12" height="12" fill="#555" rx="2"/>
  <text x="756" y="75" fill="#ccc" font-size="10">GND</text>

  <!-- Column headers -->
  <text x="30" y="100" fill="#888" font-size="10">PIN#</text>
  <text x="60" y="100" fill="#888" font-size="10">FUNCTION</text>
  <text x="210" y="100" fill="#888" font-size="10">USE</text>
  <text x="440" y="100" text-anchor="middle" fill="#4cc9f0" font-size="10" font-weight="bold">●●</text>
  <text x="490" y="100" fill="#888" font-size="10">USE</text>
  <text x="630" y="100" fill="#888" font-size="10">FUNCTION</text>
  <text x="810" y="100" fill="#888" font-size="10">PIN#</text>

  <!-- Divider line under header -->
  <line x1="20" y1="105" x2="840" y2="105" stroke="#333" stroke-width="1"/>

  <!-- Center header connector bar -->
  <rect x="422" y="108" width="36" height="574" fill="#0f3460" stroke="#4cc9f0" stroke-width="1" rx="4"/>
  <text x="440" y="120" text-anchor="middle" fill="#4cc9f0" font-size="7" transform="rotate(90,440,120)">GPIO HEADER</text>

  <!--
    Pin layout: odd pins left (1,3,5,...39), even pins right (2,4,6,...40)
    Row height: 28px, starting at y=115
    Colors per use:
      unused:  fill=#2a2a3e  text=#555
      3.3V:    fill=#e63946
      5V:      fill=#e9c46a
      GND:     fill=#555
      UART:    fill=#ff6b35
      I2C:     fill=#38b000
      SPI:     fill=#3a86ff
      Touch:   fill=#9b59b6
  -->

  <!-- Helper: each row = left pin (odd) + right pin (even) -->
  <!-- y positions: row i starts at 115 + (i-1)*28 -->

  <!-- ROW 1: Pin 1 (3.3V) | Pin 2 (5V) -->
  <rect x="340" y="115" width="80" height="22" fill="#e63946" rx="3"/>
  <text x="330" y="130" text-anchor="end" fill="#e63946" font-size="10">3.3V</text>
  <text x="310" y="130" text-anchor="end" fill="#888" font-size="10">1</text>
  <circle cx="426" cy="126" r="5" fill="#e63946"/>
  <text x="20" y="130" fill="#e63946" font-size="9" font-weight="bold">3.3V PWR</text>

  <rect x="460" y="115" width="80" height="22" fill="#e9c46a" rx="3"/>
  <text x="550" y="130" fill="#e9c46a" font-size="10">5V</text>
  <text x="830" y="130" fill="#888" font-size="10">2</text>
  <circle cx="454" cy="126" r="5" fill="#e9c46a"/>
  <text x="545" y="130" fill="#e9c46a" font-size="9" font-weight="bold">5V PWR</text>

  <!-- ROW 2: Pin 3 (GPIO2 SDA) | Pin 4 (5V) -->
  <rect x="310" y="143" width="110" height="22" fill="#38b000" rx="3"/>
  <text x="308" y="158" text-anchor="end" fill="#38b000" font-size="10">GPIO2 SDA1</text>
  <text x="295" y="158" text-anchor="end" fill="#888" font-size="10">3</text>
  <circle cx="426" cy="154" r="5" fill="#38b000"/>
  <text x="20" y="158" fill="#38b000" font-size="9" font-weight="bold">→ Env HAT I2C Data</text>

  <rect x="460" y="143" width="80" height="22" fill="#e9c46a" rx="3"/>
  <text x="550" y="158" fill="#e9c46a" font-size="10">5V</text>
  <text x="830" y="158" fill="#888" font-size="10">4</text>
  <circle cx="454" cy="154" r="5" fill="#e9c46a"/>
  <text x="545" y="158" fill="#e9c46a" font-size="9">5V PWR</text>

  <!-- ROW 3: Pin 5 (GPIO3 SCL) | Pin 6 (GND) -->
  <rect x="310" y="171" width="110" height="22" fill="#38b000" rx="3"/>
  <text x="308" y="186" text-anchor="end" fill="#38b000" font-size="10">GPIO3 SCL1</text>
  <text x="295" y="186" text-anchor="end" fill="#888" font-size="10">5</text>
  <circle cx="426" cy="182" r="5" fill="#38b000"/>
  <text x="20" y="186" fill="#38b000" font-size="9" font-weight="bold">→ Env HAT I2C Clock</text>

  <rect x="460" y="171" width="60" height="22" fill="#555" rx="3"/>
  <text x="550" y="186" fill="#aaa" font-size="10">GND</text>
  <text x="830" y="186" fill="#888" font-size="10">6</text>
  <circle cx="454" cy="182" r="5" fill="#555"/>
  <text x="545" y="186" fill="#888" font-size="9">Ground</text>

  <!-- ROW 4: Pin 7 (GPIO4) | Pin 8 (GPIO14 TXD) -->
  <rect x="340" y="199" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="214" text-anchor="end" fill="#555" font-size="10">GPIO4</text>
  <text x="295" y="214" text-anchor="end" fill="#555" font-size="10">7</text>
  <circle cx="426" cy="210" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="214" fill="#555" font-size="9">—</text>

  <rect x="460" y="199" width="110" height="22" fill="#ff6b35" rx="3"/>
  <text x="550" y="214" fill="#ff6b35" font-size="10">GPIO14 TXD0</text>
  <text x="830" y="214" fill="#888" font-size="10">8</text>
  <circle cx="454" cy="210" r="5" fill="#ff6b35"/>
  <text x="575" y="214" fill="#ff9f1c" font-size="9" font-weight="bold">→ GPS HAT RX</text>

  <!-- ROW 5: Pin 9 (GND) | Pin 10 (GPIO15 RXD) -->
  <rect x="340" y="227" width="60" height="22" fill="#555" rx="3"/>
  <text x="308" y="242" text-anchor="end" fill="#aaa" font-size="10">GND</text>
  <text x="295" y="242" text-anchor="end" fill="#888" font-size="10">9</text>
  <circle cx="426" cy="238" r="5" fill="#555"/>
  <text x="20" y="242" fill="#888" font-size="9">Ground</text>

  <rect x="460" y="227" width="110" height="22" fill="#ff6b35" rx="3"/>
  <text x="550" y="242" fill="#ff6b35" font-size="10">GPIO15 RXD0</text>
  <text x="830" y="242" fill="#888" font-size="10">10</text>
  <circle cx="454" cy="238" r="5" fill="#ff6b35"/>
  <text x="575" y="242" fill="#ff9f1c" font-size="9" font-weight="bold">← GPS HAT TX</text>

  <!-- ROW 6: Pin 11 (GPIO17 T_IRQ) | Pin 12 (GPIO18) -->
  <rect x="310" y="255" width="110" height="22" fill="#9b59b6" rx="3"/>
  <text x="308" y="270" text-anchor="end" fill="#9b59b6" font-size="10">GPIO17</text>
  <text x="295" y="270" text-anchor="end" fill="#888" font-size="10">11</text>
  <circle cx="426" cy="266" r="5" fill="#9b59b6"/>
  <text x="20" y="270" fill="#c77dff" font-size="9" font-weight="bold">→ TFT T_IRQ (touch int)</text>

  <rect x="460" y="255" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="270" fill="#555" font-size="10">GPIO18</text>
  <text x="830" y="270" fill="#555" font-size="10">12</text>
  <circle cx="454" cy="266" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="270" fill="#555" font-size="9">—</text>

  <!-- ROW 7: Pin 13 (GPIO27 RST) | Pin 14 (GND) -->
  <rect x="310" y="283" width="110" height="22" fill="#3a86ff" rx="3"/>
  <text x="308" y="298" text-anchor="end" fill="#3a86ff" font-size="10">GPIO27</text>
  <text x="295" y="298" text-anchor="end" fill="#888" font-size="10">13</text>
  <circle cx="426" cy="294" r="5" fill="#3a86ff"/>
  <text x="20" y="298" fill="#74b3ff" font-size="9" font-weight="bold">→ TFT RST</text>

  <rect x="460" y="283" width="60" height="22" fill="#555" rx="3"/>
  <text x="550" y="298" fill="#aaa" font-size="10">GND</text>
  <text x="830" y="298" fill="#888" font-size="10">14</text>
  <circle cx="454" cy="294" r="5" fill="#555"/>
  <text x="545" y="298" fill="#888" font-size="9">Ground</text>

  <!-- ROW 8: Pin 15 (GPIO22) | Pin 16 (GPIO23) -->
  <rect x="340" y="311" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="326" text-anchor="end" fill="#555" font-size="10">GPIO22</text>
  <text x="295" y="326" text-anchor="end" fill="#555" font-size="10">15</text>
  <circle cx="426" cy="322" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="326" fill="#555" font-size="9">—</text>

  <rect x="460" y="311" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="326" fill="#555" font-size="10">GPIO23</text>
  <text x="830" y="326" fill="#555" font-size="10">16</text>
  <circle cx="454" cy="322" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="326" fill="#555" font-size="9">—</text>

  <!-- ROW 9: Pin 17 (3.3V) | Pin 18 (GPIO24) -->
  <rect x="340" y="339" width="80" height="22" fill="#e63946" rx="3"/>
  <text x="308" y="354" text-anchor="end" fill="#e63946" font-size="10">3.3V</text>
  <text x="295" y="354" text-anchor="end" fill="#888" font-size="10">17</text>
  <circle cx="426" cy="350" r="5" fill="#e63946"/>
  <text x="20" y="354" fill="#e63946" font-size="9" font-weight="bold">→ TFT VIN + LITE</text>

  <rect x="460" y="339" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="354" fill="#555" font-size="10">GPIO24</text>
  <text x="830" y="354" fill="#555" font-size="10">18</text>
  <circle cx="454" cy="350" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="354" fill="#555" font-size="9">—</text>

  <!-- ROW 10: Pin 19 (GPIO10 MOSI) | Pin 20 (GND) -->
  <rect x="310" y="367" width="110" height="22" fill="#3a86ff" rx="3"/>
  <text x="308" y="382" text-anchor="end" fill="#3a86ff" font-size="10">GPIO10 MOSI</text>
  <text x="295" y="382" text-anchor="end" fill="#888" font-size="10">19</text>
  <circle cx="426" cy="378" r="5" fill="#3a86ff"/>
  <text x="20" y="382" fill="#74b3ff" font-size="9" font-weight="bold">→ TFT MOSI</text>

  <rect x="460" y="367" width="60" height="22" fill="#555" rx="3"/>
  <text x="550" y="382" fill="#aaa" font-size="10">GND</text>
  <text x="830" y="382" fill="#888" font-size="10">20</text>
  <circle cx="454" cy="378" r="5" fill="#555"/>
  <text x="545" y="382" fill="#888" font-size="9" font-weight="bold">→ TFT GND</text>

  <!-- ROW 11: Pin 21 (GPIO9 MISO) | Pin 22 (GPIO25 DC) -->
  <rect x="310" y="395" width="110" height="22" fill="#3a86ff" rx="3"/>
  <text x="308" y="410" text-anchor="end" fill="#3a86ff" font-size="10">GPIO9 MISO</text>
  <text x="295" y="410" text-anchor="end" fill="#888" font-size="10">21</text>
  <circle cx="426" cy="406" r="5" fill="#3a86ff"/>
  <text x="20" y="410" fill="#74b3ff" font-size="9" font-weight="bold">→ TFT MISO</text>

  <rect x="460" y="395" width="110" height="22" fill="#3a86ff" rx="3"/>
  <text x="550" y="410" fill="#3a86ff" font-size="10">GPIO25</text>
  <text x="830" y="410" fill="#888" font-size="10">22</text>
  <circle cx="454" cy="406" r="5" fill="#3a86ff"/>
  <text x="575" y="410" fill="#74b3ff" font-size="9" font-weight="bold">→ TFT DC (data/cmd)</text>

  <!-- ROW 12: Pin 23 (GPIO11 SCLK) | Pin 24 (GPIO8 CE0) -->
  <rect x="310" y="423" width="110" height="22" fill="#3a86ff" rx="3"/>
  <text x="308" y="438" text-anchor="end" fill="#3a86ff" font-size="10">GPIO11 SCLK</text>
  <text x="295" y="438" text-anchor="end" fill="#888" font-size="10">23</text>
  <circle cx="426" cy="434" r="5" fill="#3a86ff"/>
  <text x="20" y="438" fill="#74b3ff" font-size="9" font-weight="bold">→ TFT CLK</text>

  <rect x="460" y="423" width="110" height="22" fill="#3a86ff" rx="3"/>
  <text x="550" y="438" fill="#3a86ff" font-size="10">GPIO8 CE0</text>
  <text x="830" y="438" fill="#888" font-size="10">24</text>
  <circle cx="454" cy="434" r="5" fill="#3a86ff"/>
  <text x="575" y="438" fill="#74b3ff" font-size="9" font-weight="bold">→ TFT CS (display)</text>

  <!-- ROW 13: Pin 25 (GND) | Pin 26 (GPIO7 CE1 T_CS) -->
  <rect x="340" y="451" width="60" height="22" fill="#555" rx="3"/>
  <text x="308" y="466" text-anchor="end" fill="#aaa" font-size="10">GND</text>
  <text x="295" y="466" text-anchor="end" fill="#888" font-size="10">25</text>
  <circle cx="426" cy="462" r="5" fill="#555"/>
  <text x="20" y="466" fill="#888" font-size="9">Ground</text>

  <rect x="460" y="451" width="110" height="22" fill="#9b59b6" rx="3"/>
  <text x="550" y="466" fill="#9b59b6" font-size="10">GPIO7 CE1</text>
  <text x="830" y="466" fill="#888" font-size="10">26</text>
  <circle cx="454" cy="462" r="5" fill="#9b59b6"/>
  <text x="575" y="466" fill="#c77dff" font-size="9" font-weight="bold">→ TFT T_CS (touch)</text>

  <!-- ROW 14: Pin 27 (ID_SD) | Pin 28 (ID_SC) -->
  <rect x="340" y="479" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="494" text-anchor="end" fill="#555" font-size="10">ID_SD</text>
  <text x="295" y="494" text-anchor="end" fill="#555" font-size="10">27</text>
  <circle cx="426" cy="490" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="494" fill="#555" font-size="9">HAT EEPROM</text>

  <rect x="460" y="479" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="494" fill="#555" font-size="10">ID_SC</text>
  <text x="830" y="494" fill="#555" font-size="10">28</text>
  <circle cx="454" cy="490" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="494" fill="#555" font-size="9">HAT EEPROM</text>

  <!-- ROW 15: Pin 29 (GPIO5) | Pin 30 (GND) -->
  <rect x="340" y="507" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="522" text-anchor="end" fill="#555" font-size="10">GPIO5</text>
  <text x="295" y="522" text-anchor="end" fill="#555" font-size="10">29</text>
  <circle cx="426" cy="518" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="522" fill="#555" font-size="9">—</text>

  <rect x="460" y="507" width="60" height="22" fill="#555" rx="3"/>
  <text x="550" y="522" fill="#aaa" font-size="10">GND</text>
  <text x="830" y="522" fill="#888" font-size="10">30</text>
  <circle cx="454" cy="518" r="5" fill="#555"/>
  <text x="545" y="522" fill="#888" font-size="9">Ground</text>

  <!-- ROW 16: Pin 31 (GPIO6) | Pin 32 (GPIO12) -->
  <rect x="340" y="535" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="550" text-anchor="end" fill="#555" font-size="10">GPIO6</text>
  <text x="295" y="550" text-anchor="end" fill="#555" font-size="10">31</text>
  <circle cx="426" cy="546" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="550" fill="#555" font-size="9">—</text>

  <rect x="460" y="535" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="550" fill="#555" font-size="10">GPIO12</text>
  <text x="830" y="550" fill="#555" font-size="10">32</text>
  <circle cx="454" cy="546" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="550" fill="#555" font-size="9">—</text>

  <!-- ROW 17: Pin 33 (GPIO13) | Pin 34 (GND) -->
  <rect x="340" y="563" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="578" text-anchor="end" fill="#555" font-size="10">GPIO13</text>
  <text x="295" y="578" text-anchor="end" fill="#555" font-size="10">33</text>
  <circle cx="426" cy="574" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="578" fill="#555" font-size="9">—</text>

  <rect x="460" y="563" width="60" height="22" fill="#555" rx="3"/>
  <text x="550" y="578" fill="#aaa" font-size="10">GND</text>
  <text x="830" y="578" fill="#888" font-size="10">34</text>
  <circle cx="454" cy="574" r="5" fill="#555"/>
  <text x="545" y="578" fill="#888" font-size="9">Ground</text>

  <!-- ROW 18: Pin 35 (GPIO19) | Pin 36 (GPIO16) -->
  <rect x="340" y="591" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="606" text-anchor="end" fill="#555" font-size="10">GPIO19</text>
  <text x="295" y="606" text-anchor="end" fill="#555" font-size="10">35</text>
  <circle cx="426" cy="602" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="606" fill="#555" font-size="9">—</text>

  <rect x="460" y="591" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="606" fill="#555" font-size="10">GPIO16</text>
  <text x="830" y="606" fill="#555" font-size="10">36</text>
  <circle cx="454" cy="602" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="606" fill="#555" font-size="9">—</text>

  <!-- ROW 19: Pin 37 (GPIO26) | Pin 38 (GPIO20) -->
  <rect x="340" y="619" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="308" y="634" text-anchor="end" fill="#555" font-size="10">GPIO26</text>
  <text x="295" y="634" text-anchor="end" fill="#555" font-size="10">37</text>
  <circle cx="426" cy="630" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="20" y="634" fill="#555" font-size="9">—</text>

  <rect x="460" y="619" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="634" fill="#555" font-size="10">GPIO20</text>
  <text x="830" y="634" fill="#555" font-size="10">38</text>
  <circle cx="454" cy="630" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="634" fill="#555" font-size="9">—</text>

  <!-- ROW 20: Pin 39 (GND) | Pin 40 (GPIO21) -->
  <rect x="340" y="647" width="60" height="22" fill="#555" rx="3"/>
  <text x="308" y="662" text-anchor="end" fill="#aaa" font-size="10">GND</text>
  <text x="295" y="662" text-anchor="end" fill="#888" font-size="10">39</text>
  <circle cx="426" cy="658" r="5" fill="#555"/>
  <text x="20" y="662" fill="#888" font-size="9">Ground</text>

  <rect x="460" y="647" width="80" height="22" fill="#2a2a3e" rx="3"/>
  <text x="550" y="662" fill="#555" font-size="10">GPIO21</text>
  <text x="830" y="662" fill="#555" font-size="10">40</text>
  <circle cx="454" cy="658" r="5" fill="#2a2a3e" stroke="#444"/>
  <text x="545" y="662" fill="#555" font-size="9">—</text>

  <!-- Footer -->
  <text x="430" y="702" text-anchor="middle" fill="#444" font-size="9">Pin 1 is top-left when USB ports face down · bike_computer_gpio_pinmap.svg</text>
</svg>
